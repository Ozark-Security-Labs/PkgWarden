mode: advisory
severity-threshold: low
sarif: true
patch: false
remote-validation: true

include:
  - .github/workflows/*.yml
  - .github/workflows/*.yaml
  - go.mod
  - go.sum
  - go.work
  - go.work.sum
  - Dockerfile
  - docker-compose.yml

exclude:
  - vendor/**
  - bin/**
  - dist/**

allowlist: []
